<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes fadeInDiag1 {
        0%, 25% { opacity: 0; }
        35%, 100% { opacity: 1; }
      }
      @keyframes fadeInDiag2 {
        0%, 50% { opacity: 0; }
        60%, 100% { opacity: 1; }
      }
      @keyframes squigglyAppear1 {
        0%, 20% { opacity: 0; }
        30%, 100% { opacity: 1; }
      }
      @keyframes squigglyAppear2 {
        0%, 45% { opacity: 0; }
        55%, 100% { opacity: 1; }
      }
      @keyframes panelSlide {
        0%, 55% { opacity: 0; transform: translateY(10px); }
        65%, 100% { opacity: 1; transform: translateY(0); }
      }
      .editor-bg { fill: #1e1e1e; }
      .titlebar { fill: #323233; }
      .line-num { fill: #555; font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13px; }
      .code { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13px; }
      .key { fill: #9cdcfe; }
      .string { fill: #ce9178; }
      .section { fill: #dcdcaa; }
      .comment { fill: #6a9955; }
      .operator { fill: #d4d4d4; }
      .number { fill: #b5cea8; }
      .error-section { fill: #dcdcaa; }
      .squiggly-warn {
        animation: squigglyAppear1 4s ease forwards;
        opacity: 0;
      }
      .squiggly-error {
        animation: squigglyAppear2 4s ease forwards;
        opacity: 0;
      }
      .diag-1 {
        animation: fadeInDiag1 4s ease forwards;
        opacity: 0;
      }
      .diag-2 {
        animation: fadeInDiag2 4s ease forwards;
        opacity: 0;
      }
      .problems-panel {
        animation: panelSlide 4s ease forwards;
        opacity: 0;
      }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" class="editor-bg" stroke="#333" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="8" class="titlebar"/>
  <rect y="24" width="800" height="8" class="titlebar"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <rect x="85" y="4" width="150" height="24" fill="#1e1e1e" rx="4"/>
  <text x="97" y="20" class="code" font-size="11" fill="#ccc">starship.toml</text>

  <!-- Editor content -->
  <g class="code">
    <!-- Line 1 -->
    <text x="20" y="58" class="line-num">1</text>
    <text x="50" y="58" class="comment"># Starship configuration</text>

    <!-- Line 2 -->
    <text x="20" y="78" class="line-num">2</text>
    <text x="50" y="78" class="section">[character]</text>

    <!-- Line 3 -->
    <text x="20" y="98" class="line-num">3</text>
    <text x="50" y="98" class="key">success_symbol</text>
    <text x="166" y="98" class="operator"> = </text>
    <text x="190" y="98" class="string">"[>](bold green)"</text>

    <!-- Line 4 -->
    <text x="20" y="118" class="line-num">4</text>

    <!-- Line 5: Unknown module (warning) -->
    <text x="20" y="138" class="line-num">5</text>
    <text x="50" y="138" class="error-section">[nonexistent_module]</text>
  </g>

  <!-- Yellow squiggly underline for unknown module -->
  <g class="squiggly-warn">
    <path d="M51,141 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2" fill="none" stroke="#e5c07b" stroke-width="1.2"/>
    <!-- Warning inline hint -->
    <rect x="230" y="127" width="290" height="18" rx="3" fill="#3d3520" stroke="#e5c07b" stroke-width="0.5"/>
    <text x="238" y="140" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#e5c07b">⚠ Unknown Starship module: nonexistent_module</text>
  </g>

  <g class="code">
    <!-- Line 6 -->
    <text x="20" y="158" class="line-num">6</text>
    <text x="50" y="158" class="key">disabled</text>
    <text x="114" y="158" class="operator"> = </text>
    <text x="138" y="158" class="number">false</text>

    <!-- Line 7 -->
    <text x="20" y="178" class="line-num">7</text>

    <!-- Line 8 -->
    <text x="20" y="198" class="line-num">8</text>
    <text x="50" y="198" class="section">[directory]</text>

    <!-- Line 9: Invalid style (error) -->
    <text x="20" y="218" class="line-num">9</text>
    <text x="50" y="218" class="key">style</text>
    <text x="90" y="218" class="operator"> = </text>
    <text x="114" y="218" class="string">"bold supercolor"</text>
  </g>

  <!-- Red squiggly underline for invalid style -->
  <g class="squiggly-error">
    <path d="M115,221 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2 l2,-2 l2,2" fill="none" stroke="#f44747" stroke-width="1.2"/>
    <!-- Error inline hint -->
    <rect x="260" y="207" width="268" height="18" rx="3" fill="#3d2020" stroke="#f44747" stroke-width="0.5"/>
    <text x="268" y="220" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="11" fill="#f44747">✕ Unknown style keyword: supercolor</text>
  </g>

  <g class="code">
    <!-- Line 10 -->
    <text x="20" y="238" class="line-num">10</text>
    <text x="50" y="238" class="key">truncation_length</text>
    <text x="196" y="238" class="operator"> = </text>
    <text x="220" y="238" class="number">3</text>
  </g>

  <!-- Problems panel -->
  <g class="problems-panel">
    <!-- Panel separator -->
    <line x1="0" y1="268" x2="800" y2="268" stroke="#454545" stroke-width="1"/>

    <!-- Panel header -->
    <rect x="0" y="268" width="800" height="24" fill="#252526"/>
    <text x="16" y="284" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#cccccc">PROBLEMS</text>
    <rect x="80" y="274" width="18" height="14" rx="7" fill="#f97316"/>
    <text x="86" y="285" font-family="'Inter', Arial, sans-serif" font-size="10" font-weight="700" fill="#fff">2</text>

    <!-- Panel content -->
    <rect x="0" y="292" width="800" height="108" fill="#1e1e1e"/>

    <!-- Problem 1: Warning -->
    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12">
      <rect x="0" y="294" width="800" height="22" fill="#2a2d2e"/>
      <text x="16" y="309" fill="#e5c07b" font-size="13">⚠</text>
      <text x="34" y="309" fill="#cccccc">Unknown Starship module: </text>
      <text x="252" y="309" fill="#e5c07b">nonexistent_module</text>
      <text x="580" y="309" fill="#888" font-size="10">[Ln 5, Col 1]</text>
      <text x="680" y="309" fill="#888" font-size="10">starship-toolkit</text>
    </g>

    <!-- Problem 2: Error -->
    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12">
      <text x="16" y="333" fill="#f44747" font-size="13">✕</text>
      <text x="34" y="333" fill="#cccccc">Unknown style keyword: </text>
      <text x="238" y="333" fill="#f44747">supercolor</text>
      <text x="580" y="333" fill="#888" font-size="10">[Ln 9, Col 9]</text>
      <text x="680" y="333" fill="#888" font-size="10">starship-toolkit</text>
    </g>

    <!-- Status bar -->
    <rect x="0" y="376" width="800" height="24" fill="#f97316"/>
    <text x="16" y="392" font-family="'Inter', Arial, sans-serif" font-size="11" fill="#ffffff">⚠ 1  ✕ 1</text>
    <text x="700" y="392" font-family="'Inter', Arial, sans-serif" font-size="11" fill="#ffffff">TOML</text>
  </g>
</svg>
