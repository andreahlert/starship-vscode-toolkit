<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#2d1a00"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="editorClip">
      <rect x="620" y="80" width="520" height="460" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#f97316" stroke-width="1" transform="translate(60,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#f97316" stroke-width="1" transform="translate(120,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#f97316" stroke-width="1" transform="translate(180,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#f97316" stroke-width="1" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#f97316" stroke-width="1" transform="translate(300,0)" />
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#f97316" stroke-width="1" transform="translate(0,-60)" />
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#f97316" stroke-width="1" transform="translate(0,-120)" />
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#f97316" stroke-width="1" transform="translate(0,-180)" />
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#f97316" stroke-width="1" transform="translate(0,-240)" />
  </g>

  <!-- Orange accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentLine)"/>

  <!-- LEFT SIDE: Icon + Text -->

  <!-- Icon: orange rounded square with "St" -->
  <rect x="60" y="120" width="90" height="90" rx="18" fill="url(#iconGrad)"/>
  <rect x="61" y="121" width="88" height="88" rx="17" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.4"/>
  <text x="105" y="168" text-anchor="middle" dominant-baseline="central" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">St</text>

  <!-- Title -->
  <text x="170" y="148" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Starship Toolkit</text>
  <text x="170" y="188" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#f97316" font-weight="500">for VS Code</text>

  <!-- Divider -->
  <rect x="60" y="240" width="480" height="1" fill="#f97316" opacity="0.3"/>

  <!-- Features list -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#e5e5e5">
    <!-- Feature 1 -->
    <circle cx="80" cy="283" r="4" fill="#f97316"/>
    <text x="100" y="289" font-weight="600" fill="#f97316">70+ modules</text>
    <text x="235" y="289" fill="#a3a3a3" font-size="15">with full schema coverage</text>

    <!-- Feature 2 -->
    <circle cx="80" cy="323" r="4" fill="#f97316"/>
    <text x="100" y="329" font-weight="600" fill="#f97316">Style completions</text>
    <text x="275" y="329" fill="#a3a3a3" font-size="15">colors, modifiers, hex</text>

    <!-- Feature 3 -->
    <circle cx="80" cy="363" r="4" fill="#f97316"/>
    <text x="100" y="369" font-weight="600" fill="#f97316">Format variables</text>
    <text x="275" y="369" fill="#a3a3a3" font-size="15">$symbol, $version, $branch</text>

    <!-- Feature 4 -->
    <circle cx="80" cy="403" r="4" fill="#f97316"/>
    <text x="100" y="409" font-weight="600" fill="#f97316">Real-time validation</text>
    <text x="295" y="409" fill="#a3a3a3" font-size="15">diagnostics as you type</text>

    <!-- Feature 5 -->
    <circle cx="80" cy="443" r="4" fill="#f97316"/>
    <text x="100" y="449" font-weight="600" fill="#f97316">10 snippets</text>
    <text x="225" y="449" fill="#a3a3a3" font-size="15">quick-start templates</text>
  </g>

  <!-- RIGHT SIDE: Simulated VS Code editor -->
  <g clip-path="url(#editorClip)">
    <!-- Editor window background -->
    <rect x="620" y="80" width="520" height="460" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="620" y="80" width="520" height="32" rx="8" fill="#323233"/>
    <rect x="620" y="104" width="520" height="8" fill="#323233"/>
    <!-- Traffic lights -->
    <circle cx="642" cy="96" r="6" fill="#ff5f57"/>
    <circle cx="662" cy="96" r="6" fill="#febc2e"/>
    <circle cx="682" cy="96" r="6" fill="#28c840"/>
    <!-- Tab -->
    <rect x="710" y="82" width="160" height="28" fill="#1e1e1e" rx="4"/>
    <text x="722" y="100" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12" fill="#cccccc">starship.toml</text>

    <!-- Line numbers gutter -->
    <rect x="620" y="112" width="40" height="428" fill="#1e1e1e"/>

    <!-- Code content -->
    <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13">
      <!-- Line 1 -->
      <text x="640" y="138" fill="#555">1</text>
      <text x="670" y="138" fill="#6a9955"># Starship configuration</text>

      <!-- Line 2 -->
      <text x="640" y="158" fill="#555">2</text>
      <text x="670" y="158" fill="#9cdcfe">format</text>
      <text x="716" y="158" fill="#d4d4d4"> = </text>
      <text x="736" y="158" fill="#ce9178">"$directory$git_branch$character"</text>

      <!-- Line 3 -->
      <text x="640" y="178" fill="#555">3</text>

      <!-- Line 4 -->
      <text x="640" y="198" fill="#555">4</text>
      <text x="670" y="198" fill="#dcdcaa">[character]</text>

      <!-- Line 5 -->
      <text x="640" y="218" fill="#555">5</text>
      <text x="670" y="218" fill="#9cdcfe">success_symbol</text>
      <text x="786" y="218" fill="#d4d4d4"> = </text>
      <text x="806" y="218" fill="#ce9178">"[>](bold green)"</text>

      <!-- Line 6 -->
      <text x="640" y="238" fill="#555">6</text>
      <text x="670" y="238" fill="#9cdcfe">error_symbol</text>
      <text x="778" y="238" fill="#d4d4d4"> = </text>
      <text x="798" y="238" fill="#ce9178">"[x](bold red)"</text>

      <!-- Line 7 -->
      <text x="640" y="258" fill="#555">7</text>

      <!-- Line 8 -->
      <text x="640" y="278" fill="#555">8</text>
      <text x="670" y="278" fill="#dcdcaa">[directory]</text>

      <!-- Line 9 -->
      <text x="640" y="298" fill="#555">9</text>
      <text x="670" y="298" fill="#9cdcfe">truncation_length</text>
      <text x="812" y="298" fill="#d4d4d4"> = </text>
      <text x="832" y="298" fill="#b5cea8">3</text>

      <!-- Line 10 -->
      <text x="636" y="318" fill="#555">10</text>
      <text x="670" y="318" fill="#9cdcfe">style</text>
      <text x="710" y="318" fill="#d4d4d4"> = </text>
      <text x="730" y="318" fill="#ce9178">"bold cyan"</text>

      <!-- Line 11 -->
      <text x="636" y="338" fill="#555">11</text>

      <!-- Line 12: cursor typing -->
      <text x="636" y="358" fill="#555">12</text>
      <text x="670" y="358" fill="#dcdcaa">[</text>
    </g>

    <!-- Completion dropdown -->
    <g filter="url(#glow)">
      <rect x="668" y="365" width="280" height="180" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

      <!-- Completion items -->
      <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="12">
        <!-- Selected item -->
        <rect x="670" y="367" width="276" height="22" fill="#094771" rx="2"/>
        <text x="690" y="382" fill="#f97316">&#9633;</text>
        <text x="708" y="382" fill="#ffffff">git_branch</text>
        <text x="850" y="382" fill="#888" font-size="10">Git branch name</text>

        <text x="690" y="404" fill="#569cd6">&#9633;</text>
        <text x="708" y="404" fill="#cccccc">git_status</text>
        <text x="850" y="404" fill="#888" font-size="10">Git file status</text>

        <text x="690" y="426" fill="#569cd6">&#9633;</text>
        <text x="708" y="426" fill="#cccccc">nodejs</text>
        <text x="850" y="426" fill="#888" font-size="10">Node.js version</text>

        <text x="690" y="448" fill="#569cd6">&#9633;</text>
        <text x="708" y="448" fill="#cccccc">python</text>
        <text x="850" y="448" fill="#888" font-size="10">Python version</text>

        <text x="690" y="470" fill="#569cd6">&#9633;</text>
        <text x="708" y="470" fill="#cccccc">rust</text>
        <text x="850" y="470" fill="#888" font-size="10">Rust version</text>

        <text x="690" y="492" fill="#569cd6">&#9633;</text>
        <text x="708" y="492" fill="#cccccc">kubernetes</text>
        <text x="850" y="492" fill="#888" font-size="10">K8s context</text>

        <text x="690" y="514" fill="#569cd6">&#9633;</text>
        <text x="708" y="514" fill="#cccccc">docker_context</text>
        <text x="850" y="514" fill="#888" font-size="10">Docker context</text>

        <text x="690" y="536" fill="#569cd6">&#9633;</text>
        <text x="708" y="536" fill="#cccccc">directory</text>
        <text x="850" y="536" fill="#888" font-size="10">Current path</text>
      </g>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#000000" opacity="0.3"/>
  <text x="600" y="615" text-anchor="middle" font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="14" fill="#f97316" opacity="0.7">github.com/andreahlert/starship-vscode-toolkit</text>

  <!-- Orange accent line bottom -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#accentLine)"/>
</svg>
