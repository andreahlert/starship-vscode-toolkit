<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes slideDown {
        0% { opacity: 0; transform: translateY(-8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes cursorBlink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      @keyframes typeBracket {
        0%, 30% { opacity: 0; }
        35%, 100% { opacity: 1; }
      }
      .editor-bg { fill: #1e1e1e; }
      .titlebar { fill: #323233; }
      .line-num { fill: #555; font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13px; }
      .code { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13px; }
      .key { fill: #9cdcfe; }
      .string { fill: #ce9178; }
      .section { fill: #dcdcaa; }
      .comment { fill: #6a9955; }
      .operator { fill: #d4d4d4; }
      .number { fill: #b5cea8; }
      .bracket-type {
        animation: typeBracket 3s ease forwards;
      }
      .cursor {
        animation: cursorBlink 1s step-end infinite;
        animation-delay: 1.5s;
      }
      .dropdown {
        animation: slideDown 0.3s ease forwards;
        animation-delay: 1.8s;
        opacity: 0;
      }
      .item-1 { animation: fadeIn 0.15s ease forwards; animation-delay: 2.0s; opacity: 0; }
      .item-2 { animation: fadeIn 0.15s ease forwards; animation-delay: 2.15s; opacity: 0; }
      .item-3 { animation: fadeIn 0.15s ease forwards; animation-delay: 2.3s; opacity: 0; }
      .item-4 { animation: fadeIn 0.15s ease forwards; animation-delay: 2.45s; opacity: 0; }
      .item-5 { animation: fadeIn 0.15s ease forwards; animation-delay: 2.6s; opacity: 0; }
      .item-6 { animation: fadeIn 0.15s ease forwards; animation-delay: 2.75s; opacity: 0; }
      .item-7 { animation: fadeIn 0.15s ease forwards; animation-delay: 2.9s; opacity: 0; }
      .item-8 { animation: fadeIn 0.15s ease forwards; animation-delay: 3.05s; opacity: 0; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" class="editor-bg" stroke="#333" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="800" height="32" rx="8" class="titlebar"/>
  <rect y="24" width="800" height="8" class="titlebar"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <rect x="85" y="4" width="150" height="24" fill="#1e1e1e" rx="4"/>
  <text x="97" y="20" class="code" font-size="11" fill="#ccc">starship.toml</text>

  <!-- Editor content -->
  <g class="code">
    <!-- Line 1 -->
    <text x="20" y="58" class="line-num">1</text>
    <text x="50" y="58" class="comment"># My starship config</text>

    <!-- Line 2 -->
    <text x="20" y="78" class="line-num">2</text>
    <text x="50" y="78" class="key">format</text>
    <text x="96" y="78" class="operator"> = </text>
    <text x="120" y="78" class="string">"$all"</text>

    <!-- Line 3 -->
    <text x="20" y="98" class="line-num">3</text>

    <!-- Line 4 -->
    <text x="20" y="118" class="line-num">4</text>
    <text x="50" y="118" class="section">[character]</text>

    <!-- Line 5 -->
    <text x="20" y="138" class="line-num">5</text>
    <text x="50" y="138" class="key">success_symbol</text>
    <text x="166" y="138" class="operator"> = </text>
    <text x="190" y="138" class="string">"[>](bold green)"</text>

    <!-- Line 6 -->
    <text x="20" y="158" class="line-num">6</text>

    <!-- Line 7 -->
    <text x="20" y="178" class="line-num">7</text>
    <text x="50" y="178" class="section">[directory]</text>

    <!-- Line 8 -->
    <text x="20" y="198" class="line-num">8</text>
    <text x="50" y="198" class="key">truncation_length</text>
    <text x="196" y="198" class="operator"> = </text>
    <text x="220" y="198" class="number">3</text>

    <!-- Line 9 -->
    <text x="20" y="218" class="line-num">9</text>

    <!-- Line 10: user types [ -->
    <text x="20" y="238" class="line-num">10</text>
    <text x="50" y="238" class="section bracket-type">[</text>

    <!-- Blinking cursor -->
    <rect x="58" y="226" width="2" height="16" fill="#f97316" class="cursor"/>
  </g>

  <!-- Completion dropdown -->
  <g class="dropdown">
    <rect x="48" y="246" width="340" height="148" rx="4" fill="#252526" stroke="#454545" stroke-width="1"/>

    <g class="code" font-size="12">
      <!-- Item 1 - selected -->
      <g class="item-1">
        <rect x="50" y="248" width="336" height="18" fill="#094771" rx="2"/>
        <text x="58" y="261" fill="#f97316" font-size="11">M</text>
        <text x="74" y="261" fill="#ffffff">character</text>
        <text x="230" y="261" fill="#888" font-size="10">Prompt character symbol</text>
      </g>

      <!-- Item 2 -->
      <g class="item-2">
        <text x="58" y="279" fill="#569cd6" font-size="11">M</text>
        <text x="74" y="279" fill="#cccccc">directory</text>
        <text x="230" y="279" fill="#888" font-size="10">Current directory path</text>
      </g>

      <!-- Item 3 -->
      <g class="item-3">
        <text x="58" y="297" fill="#569cd6" font-size="11">M</text>
        <text x="74" y="297" fill="#cccccc">git_branch</text>
        <text x="230" y="297" fill="#888" font-size="10">Active git branch name</text>
      </g>

      <!-- Item 4 -->
      <g class="item-4">
        <text x="58" y="315" fill="#569cd6" font-size="11">M</text>
        <text x="74" y="315" fill="#cccccc">git_status</text>
        <text x="230" y="315" fill="#888" font-size="10">Git working tree status</text>
      </g>

      <!-- Item 5 -->
      <g class="item-5">
        <text x="58" y="333" fill="#569cd6" font-size="11">M</text>
        <text x="74" y="333" fill="#cccccc">nodejs</text>
        <text x="230" y="333" fill="#888" font-size="10">Node.js runtime version</text>
      </g>

      <!-- Item 6 -->
      <g class="item-6">
        <text x="58" y="351" fill="#569cd6" font-size="11">M</text>
        <text x="74" y="351" fill="#cccccc">python</text>
        <text x="230" y="351" fill="#888" font-size="10">Python version and venv</text>
      </g>

      <!-- Item 7 -->
      <g class="item-7">
        <text x="58" y="369" fill="#569cd6" font-size="11">M</text>
        <text x="74" y="369" fill="#cccccc">rust</text>
        <text x="230" y="369" fill="#888" font-size="10">Rust toolchain version</text>
      </g>

      <!-- Item 8 -->
      <g class="item-8">
        <text x="58" y="387" fill="#569cd6" font-size="11">M</text>
        <text x="74" y="387" fill="#cccccc">kubernetes</text>
        <text x="230" y="387" fill="#888" font-size="10">K8s context and namespace</text>
      </g>
    </g>
  </g>
</svg>
